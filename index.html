<!DOCTYPE html>
<html>
<head>
  <title>Cashflow Pro V4.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#0f172a] text-gray-200">

<div class="max-w-md mx-auto p-4 space-y-4">

  <!-- LOGIN -->
  <div id="auth" class="bg-[#1e293b] p-6 rounded-xl border border-gray-800">
    <h2 class="text-lg font-semibold mb-4">Cashflow Login</h2>
    <input id="email" placeholder="Your name"
      class="w-full p-2 rounded text-black mb-3">
    <button onclick="login()"
      class="w-full bg-white text-black p-2 rounded">
      Continue
    </button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden space-y-4">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
      <h1 id="title" class="text-lg font-semibold"></h1>
      <select id="currency" onchange="changeCurrency()"
        class="bg-[#1e293b] border border-gray-700 p-2 rounded text-sm">
        <option value="IDR">IDR</option>
        <option value="USD">USD</option>
      </select>
    </div>

    <!-- BALANCE -->
    <div class="bg-[#1e293b] p-4 rounded-xl border border-gray-800">
      <div class="text-sm text-gray-400">Total Balance</div>
      <div id="balance" class="text-2xl font-bold mt-1"></div>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-2 text-sm">
      <div class="bg-[#1e293b] p-3 rounded">
        Income<br><b id="income"></b>
      </div>
      <div class="bg-[#1e293b] p-3 rounded">
        Expense<br><b id="expense"></b>
      </div>
      <div class="bg-[#1e293b] p-3 rounded">
        Net<br><b id="net"></b>
      </div>
    </div>

    <!-- FORM -->
    <div class="bg-[#1e293b] p-4 rounded-xl space-y-2">
      <input id="name" placeholder="Cashflow Name"
        class="w-full p-2 rounded text-black">

      <input id="amount" type="number" placeholder="Amount"
        class="w-full p-2 rounded text-black">

      <div class="grid grid-cols-2 gap-2">
        <select id="category" class="p-2 rounded text-black">
          <option>Food</option>
          <option>Gas</option>
          <option>Bills</option>
          <option>Salary</option>
          <option>Other</option>
        </select>

        <select id="type" class="p-2 rounded text-black">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <button onclick="addData()"
        class="w-full bg-green-400 text-black p-2 rounded">
        Add Transaction
      </button>
    </div>

    <!-- CHART -->
    <div class="bg-[#1e293b] p-4 rounded-xl">
      <canvas id="trend"></canvas>
    </div>

    <!-- LIST -->
    <div id="list" class="space-y-2"></div>

  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyBDvRCOUunIKsmhKL1k_kpHVC1778i6GVQct4-OM2B5oalyywjZfx-eUlPWkf9cvMo/exec";

let editTarget = null;
let chart;
let isSubmitting = false;
let currentCurrency = localStorage.getItem("currency") || "IDR";
let rate = 15500;

// LOGIN
function login(){
  localStorage.setItem("email", email.value);
  init();
}

// INIT
async function init(){
  const user = localStorage.getItem("email");
  if(!user) return;

  currency.value = currentCurrency;

  await getRate();

  auth.style.display="none";
  app.style.display="block";
  title.innerText = user;

  loadData();
}

// LIVE RATE
async function getRate(){
  try {
    const res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    const data = await res.json();
    rate = data.rates.IDR;
  } catch(e){
    console.log("Fallback rate used");
  }
}

// CHANGE CURRENCY
function changeCurrency(){
  currentCurrency = currency.value;
  localStorage.setItem("currency", currentCurrency);
  loadData();
}

// FORMAT
function format(num){
  return currentCurrency === "IDR"
    ? "Rp " + num.toLocaleString("id-ID")
    : "$ " + num.toLocaleString("en-US");
}

// CONVERT
function convert(amount, from, to){
  if(from === to) return amount;
  if(from === "IDR" && to === "USD") return amount / rate;
  if(from === "USD" && to === "IDR") return amount * rate;
}

// ADD / EDIT
async function addData(){
  if(isSubmitting) return;
  isSubmitting = true;

  const payload = {
    email: localStorage.getItem("email"),
    name: name.value,
    category: category.value,
    amount: Number(amount.value),
    type: type.value,
    date: editTarget || new Date().toISOString(),
    action: editTarget ? "edit" : "add"
  };

  await fetch(API, {
    method:"POST",
    body: JSON.stringify(payload)
  });

  isSubmitting = false;
  editTarget = null;

  loadData();
}

// DELETE
async function del(date){
  await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"delete",
      email: localStorage.getItem("email"),
      date
    })
  });

  loadData();
}

// EDIT
function edit(d){
  name.value = d.name;
  category.value = d.category;
  amount.value = d.amount;
  type.value = d.type;
  editTarget = d.date;
}

// LOAD
async function loadData(){
  const res = await fetch(API + "?email=" + localStorage.getItem("email"));
  const data = await res.json();

  list.innerHTML = data.map(d => `
    <div class="bg-[#1e293b] p-3 rounded flex justify-between">
      <div>
        <div>${d.category}</div>
        <div class="text-xs text-gray-400">
          ${new Date(d.date).toLocaleString()}
        </div>
      </div>
      <div class="text-right">
        <div class="${d.type==='income'?'text-green-400':'text-red-400'}">
          ${d.type==='income'?'+':'-'} ${format(convert(d.amount,"IDR",currentCurrency))}
        </div>
        <div class="text-xs">
          <button onclick='edit(${JSON.stringify(d)})'>Edit</button> |
          <button onclick='del("${d.date}")'>Delete</button>
        </div>
      </div>
    </div>
  `).join("");

  calcBalance(data);
  renderTrend(data);
}

// BALANCE
function calcBalance(data){
  let total=0, inc=0, exp=0;

  data.forEach(d=>{
    const val = convert(d.amount,"IDR",currentCurrency);

    if(d.type==="income"){
      total+=val; inc+=val;
    } else {
      total-=val; exp+=val;
    }
  });

  balance.innerText = format(total);
  income.innerText = format(inc);
  expense.innerText = format(exp);
  net.innerText = format(total);
}

// TREND
function renderTrend(data){
  let incomeData={}, expenseData={};

  data.forEach(d=>{
    let day=d.date.split("T")[0];
    let val=convert(d.amount,"IDR",currentCurrency);

    if(d.type==="income"){
      incomeData[day]=(incomeData[day]||0)+val;
    } else {
      expenseData[day]=(expenseData[day]||0)+val;
    }
  });

  const labels=[...new Set([...Object.keys(incomeData),...Object.keys(expenseData)])];

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("trend"), {
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"Income",data:labels.map(l=>incomeData[l]||0)},
        {label:"Expense",data:labels.map(l=>expenseData[l]||0)}
      ]
    }
  });
}

init();
</script>

</body>
</html>
