<!DOCTYPE html>
<html>
<head>
  <title>Cashflow Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PDF LIB -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-[#0b1220] text-gray-200">

<!-- LOGIN -->
<div id="auth" class="flex items-center justify-center h-screen">
  <div class="bg-[#1f2937] p-6 rounded w-80 text-center">

    <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png"
      class="mx-auto mb-4 h-12">

    <input id="email" placeholder="Your name"
      class="w-full p-2 text-black rounded mb-3">

    <button onclick="login()" class="w-full bg-white text-black p-2 rounded">
      Enter
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex min-h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-[#111827] p-5 hidden md:block">

    <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png"
      class="mb-6 h-10">

    <button onclick="logout()" class="w-full text-left p-2 hover:bg-red-500 rounded">
      Logout
    </button>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-6 space-y-6">

    <!-- TOP -->
    <div class="flex justify-between items-center">
      <h1 id="title" class="text-2xl font-bold"></h1>

      <div class="flex gap-2">

        <select id="filter" onchange="loadData()" class="bg-[#1f2937] p-2 rounded">
          <option value="all">All</option>
          <option value="day">Today</option>
          <option value="week">7 Days</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
        </select>

        <select id="currency" onchange="changeCurrency()" class="bg-[#1f2937] p-2 rounded">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
        </select>

        <button onclick="exportPDF()"
          class="bg-blue-500 px-3 rounded">
          Export PDF
        </button>

      </div>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-[#1f2937] p-4 rounded">Balance<br><b id="balance"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Income<br><b id="income"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Expense<br><b id="expense"></b></div>
    </div>

    <!-- FORM -->
    <div class="bg-[#1f2937] p-4 rounded space-y-2">

      <input id="amount" type="number" placeholder="Amount"
        class="w-full p-2 text-black rounded">

      <input id="dateInput" type="datetime-local"
        class="w-full p-2 text-black rounded">

      <div class="grid grid-cols-2 gap-2">
        <select id="category" class="p-2 text-black rounded">
          <option>Food</option>
          <option>Gas</option>
          <option>Bills</option>
          <option>Salary</option>
          <option>Other</option>
        </select>

        <select id="type" class="p-2 text-black rounded">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <button onclick="addData()" class="w-full bg-green-500 p-2 rounded">
        Save
      </button>
    </div>

    <!-- LIST -->
    <div class="bg-[#1f2937] p-4 rounded">
      <div id="list"></div>
    </div>

  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzFqkTgUqbKflvUB-VnB5oNXDr-9Zjy6OlB-b1D7OfnV2fUfky8QTlKDzK10HDU7bNB/exec";

let rate=15500;
let currentCurrency=localStorage.getItem("currency")||"IDR";
let currentData=[];

// LOGIN
function login(){
  localStorage.setItem("email", email.value);
  startApp();
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// START
async function startApp(){
  let user=localStorage.getItem("email");

  if(!user){
    auth.style.display="flex";
    app.style.display="none";
    return;
  }

  auth.style.display="none";
  app.style.display="flex";

  title.innerText=user;
  currency.value=currentCurrency;

  let res=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
  let data=await res.json();
  rate=data.rates.IDR;

  loadData();
}

// FORMAT
function format(n){
  return currentCurrency==="IDR"
    ?"Rp "+Math.round(n).toLocaleString("id-ID")
    :"$"+Math.round(n);
}

// CONVERT
function convert(n){
  return currentCurrency==="IDR"?n:n/rate;
}

// CHANGE CURRENCY
function changeCurrency(){
  currentCurrency=currency.value;
  localStorage.setItem("currency",currentCurrency);
  loadData();
}

// ADD
async function addData(){
  let raw=Number(amount.value);
  let stored=currentCurrency==="USD"?raw*rate:raw;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      email:localStorage.getItem("email"),
      category:category.value,
      amount:stored,
      type:type.value,
      date:dateInput.value||new Date().toISOString()
    })
  });

  loadData();
}

// FILTER
function applyFilter(data){
  let f=filter.value;
  let now=new Date();

  return data.filter(d=>{
    let t=new Date(d.date);

    if(f==="day") return t.toDateString()===now.toDateString();

    if(f==="week"){
      return (now-t)/(1000*60*60*24)<=7;
    }

    if(f==="month"){
      return t.getMonth()===now.getMonth() &&
             t.getFullYear()===now.getFullYear();
    }

    if(f==="year"){
      return t.getFullYear()===now.getFullYear();
    }

    return true;
  });
}

// LOAD
async function loadData(){
  let res=await fetch(API+"?email="+localStorage.getItem("email"));
  let data=await res.json();

  data=applyFilter(data);
  data.sort((a,b)=>new Date(b.date)-new Date(a.date));

  currentData=data;

  list.innerHTML=data.map(d=>`
    <div class="flex justify-between border-b border-gray-700 py-2">
      <div>
        ${d.category}<br>
        <small>${new Date(d.date).toLocaleString()}</small>
      </div>
      <div class="${d.type==='income'?'text-green-400':'text-red-400'}">
        ${d.type==='income'?'+':'-'} ${format(convert(d.amount))}
      </div>
    </div>
  `).join("");

  calc(data);
}

// CALC
function calc(data){
  let t=0,i=0,e=0;

  data.forEach(d=>{
    let v=convert(d.amount);
    if(d.type==="income"){t+=v;i+=v;}
    else{t-=v;e+=v;}
  });

  balance.innerText=format(t);
  income.innerText=format(i);
  expense.innerText=format(e);
}

// EXPORT PDF
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Cashflow Report", 10, 10);

  let y=20;

  currentData.forEach(d=>{
    let line = `${d.category} | ${d.type} | ${format(convert(d.amount))}`;
    doc.text(line,10,y);
    y+=8;
  });

  doc.save("cashflow.pdf");
}

startApp();
</script>

</body>
</html>
