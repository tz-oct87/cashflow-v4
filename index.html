<!DOCTYPE html>
<html>
<head>
  <title>Cashflow Pro V7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#0b1220] text-gray-200">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-[#111827] p-5 hidden md:block">
    <h2 class="text-xl font-bold mb-6">Cashflow</h2>

    <div class="space-y-2 text-sm">
      <div class="p-2 bg-[#1f2937] rounded">Dashboard</div>
      <button onclick="logout()" class="p-2 w-full text-left hover:bg-red-500 rounded">
        Logout
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-6 space-y-6">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center">
      <h1 id="title" class="text-2xl font-bold"></h1>

      <div class="flex gap-3">
        <select id="filter" onchange="loadData()" class="bg-[#1f2937] p-2 rounded">
          <option value="all">All</option>
          <option value="day">Today</option>
          <option value="week">Week</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
        </select>

        <select id="currency" onchange="changeCurrency()" class="bg-[#1f2937] p-2 rounded">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
        </select>
      </div>
    </div>

    <!-- GRID -->
    <div class="grid md:grid-cols-3 gap-4">

      <div class="bg-[#1f2937] p-4 rounded">
        Balance<br><b id="balance"></b>
      </div>

      <div class="bg-[#1f2937] p-4 rounded">
        Income<br><b id="income"></b>
      </div>

      <div class="bg-[#1f2937] p-4 rounded">
        Expense<br><b id="expense"></b>
      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="grid md:grid-cols-2 gap-6">

      <!-- FORM -->
      <div class="bg-[#1f2937] p-4 rounded space-y-2">
        <input id="name" placeholder="Name" class="w-full p-2 text-black rounded">
        <input id="amount" type="number" placeholder="Amount" class="w-full p-2 text-black rounded">
        <input id="dateInput" type="datetime-local" class="w-full p-2 text-black rounded">

        <div class="grid grid-cols-2 gap-2">
          <select id="category" class="p-2 text-black rounded">
            <option>Food</option>
            <option>Gas</option>
            <option>Bills</option>
            <option>Salary</option>
            <option>Other</option>
          </select>

          <select id="type" class="p-2 text-black rounded">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <button id="saveBtn" onclick="addData()"
          class="w-full bg-green-500 p-2 rounded hover:opacity-80">
          Save Transaction
        </button>
      </div>

      <!-- CHART -->
      <div class="bg-[#1f2937] p-4 rounded">
        <canvas id="trend"></canvas>
      </div>

    </div>

    <!-- LIST -->
    <div class="bg-[#1f2937] p-4 rounded">
      <h3 class="mb-3">Transactions</h3>
      <div id="list" class="space-y-2 max-h-[400px] overflow-auto"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-5 right-5 bg-green-500 px-4 py-2 rounded"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbzxKxarwVTitY64I5fQWkMZ-ru7giI5mlMynLj0nRjysegRyaV2vjB526T5PPvh2tjK/exec";

let rate=15500,currentCurrency="IDR";
let isSubmitting=false,chart;

// INIT
async function init(){
  title.innerText=localStorage.getItem("email");

  let res=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
  let d=await res.json();
  rate=d.rates.IDR;

  loadData();
}

// TOAST
function showToast(msg){
  toast.innerText=msg;
  toast.classList.remove("hidden");
  setTimeout(()=>toast.classList.add("hidden"),2000);
}

// FORMAT
function format(n){
  return currentCurrency==="IDR"
    ?"Rp "+Math.round(n).toLocaleString("id-ID")
    :"$"+Math.round(n);
}

function convert(n){return currentCurrency==="IDR"?n:n/rate;}

// ADD
async function addData(){
  if(isSubmitting) return;
  isSubmitting=true;
  saveBtn.innerText="Saving...";

  let raw=Number(amount.value);
  let stored=currentCurrency==="USD"?raw*rate:raw;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      email:localStorage.getItem("email"),
      name:name.value,
      category:category.value,
      amount:stored,
      type:type.value,
      date:dateInput.value||new Date().toISOString(),
      display:format(raw)
    })
  });

  showToast("Saved!");
  isSubmitting=false;
  saveBtn.innerText="Save Transaction";

  loadData();
}

// LOAD
async function loadData(){
  let res=await fetch(API+"?email="+localStorage.getItem("email"));
  let data=await res.json();

  list.innerHTML=data.map(d=>`
    <div class="flex justify-between border-b border-gray-700 pb-1">
      <div>${d.category}<br><small>${new Date(d.date).toLocaleString()}</small></div>
      <div>${d.display}</div>
    </div>
  `).join("");

  calc(data);
  renderChart(data);
}

// CALC
function calc(data){
  let t=0,i=0,e=0;
  data.forEach(d=>{
    let v=convert(d.amount);
    if(d.type==="income"){t+=v;i+=v;} else {t-=v;e+=v;}
  });
  balance.innerText=format(t);
  income.innerText=format(i);
  expense.innerText=format(e);
}

// CHART
function renderChart(data){
  let map={};

  data.forEach(d=>{
    let day=d.date.split("T")[0];
    map[day]=(map[day]||0)+(d.type==="income"?convert(d.amount):-convert(d.amount));
  });

  let labels=Object.keys(map);

  if(chart) chart.destroy();

  chart=new Chart(trend,{
    type:"line",
    data:{
      labels,
      datasets:[{data:Object.values(map)}]
    }
  });
}

function logout(){
  localStorage.clear();
  location.reload();
}

init();
</script>

</body>
</html>
