<!DOCTYPE html>
<html>
<head>
  <title>Cashflow Pro V5.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#0f172a] text-gray-200">

<div class="max-w-md mx-auto p-4 space-y-4">

  <!-- LOGIN -->
  <div id="auth" class="bg-[#1e293b] p-6 rounded-xl">
    <input id="email" placeholder="Your name"
      class="w-full p-2 text-black rounded mb-3">
    <button onclick="login()" class="w-full bg-white text-black p-2 rounded">
      Enter
    </button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden space-y-4">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
      <h1 id="title"></h1>

      <div class="flex gap-2">
        <select id="currency" onchange="changeCurrency()"
          class="bg-[#1e293b] p-2 rounded">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
        </select>

        <button onclick="logout()" class="bg-red-500 px-2 rounded text-xs">
          Logout
        </button>
      </div>
    </div>

    <!-- BALANCE -->
    <div class="bg-[#1e293b] p-4 rounded">
      Balance: <b id="balance"></b>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-2">
      <div>Income<br><b id="income"></b></div>
      <div>Expense<br><b id="expense"></b></div>
      <div>Net<br><b id="net"></b></div>
    </div>

    <!-- FORM -->
    <div class="bg-[#1e293b] p-3 rounded space-y-2">
      <input id="name" placeholder="Name" class="w-full p-2 text-black rounded">
      <input id="amount" type="number" placeholder="Amount" class="w-full p-2 text-black rounded">

      <div class="grid grid-cols-2 gap-2">
        <select id="category" class="p-2 text-black rounded">
          <option>Food</option>
          <option>Gas</option>
          <option>Bills</option>
          <option>Salary</option>
          <option>Other</option>
        </select>

        <select id="type" class="p-2 text-black rounded">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <button onclick="addData()" class="w-full bg-green-400 p-2 rounded">
        Save
      </button>
    </div>

    <!-- CHART -->
    <canvas id="trend"></canvas>

    <!-- LIST -->
    <div id="list"></div>

  </div>
</div>

<!-- DELETE MODAL -->
<div id="confirmBox" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-[#1e293b] p-6 rounded text-center">
    <p>Delete this transaction?</p>
    <button onclick="confirmDelete()" class="bg-red-500 px-3 py-1 mt-2">Yes</button>
    <button onclick="closeConfirm()" class="bg-gray-500 px-3 py-1 mt-2">Cancel</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzxKxarwVTitY64I5fQWkMZ-ru7giI5mlMynLj0nRjysegRyaV2vjB526T5PPvh2tjK/exec";

let currentCurrency = localStorage.getItem("currency") || "IDR";
let rate = 15500;
let isSubmitting = false;
let editTarget = null;
let deleteTarget = null;
let chart;

// LOGIN
function login(){
  localStorage.setItem("email", email.value);
  init();
}

function logout(){
  localStorage.removeItem("email");
  location.reload();
}

// INIT
async function init(){
  const user = localStorage.getItem("email");
  if(!user) return;

  currency.value = currentCurrency;

  await getRate();
  setInterval(getRate, 3600000);

  auth.style.display="none";
  app.style.display="block";
  title.innerText = user;

  loadData();
}

// LIVE RATE
async function getRate(){
  try{
    const res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    const data = await res.json();
    rate = data.rates.IDR;
  }catch(e){}
}

// FORMAT
function format(num){
  return currentCurrency==="IDR"
    ? "Rp " + Math.round(num).toLocaleString("id-ID")
    : "$" + Math.round(num).toLocaleString("en-US");
}

// CONVERT FROM IDR BASE
function convert(amount){
  return currentCurrency==="IDR"
    ? amount
    : amount / rate;
}

// CHANGE CURRENCY
function changeCurrency(){
  currentCurrency = currency.value;
  localStorage.setItem("currency", currentCurrency);
  loadData();
}

// ADD
async function addData(){
  if(isSubmitting) return;
  isSubmitting = true;

  let raw = Number(amount.value);

  let stored = currentCurrency==="USD"
    ? raw * rate
    : raw;

  const payload = {
    email: localStorage.getItem("email"),
    name: name.value,
    category: category.value,
    amount: stored,
    type: type.value,
    date: editTarget || new Date().toISOString(),
    display: format(raw),
    action: editTarget ? "edit" : "add"
  };

  await fetch(API,{method:"POST",body:JSON.stringify(payload)});

  isSubmitting = false;
  editTarget = null;
  loadData();
}

// DELETE FLOW
function del(date){
  deleteTarget = date;
  confirmBox.classList.remove("hidden");
}

function closeConfirm(){
  confirmBox.classList.add("hidden");
}

async function confirmDelete(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      email:localStorage.getItem("email"),
      date:deleteTarget
    })
  });

  closeConfirm();
  loadData();
}

// EDIT
function edit(d){
  name.value = d.name;
  category.value = d.category;
  amount.value = d.amount;
  type.value = d.type;
  editTarget = d.date;
  window.scrollTo({top:0,behavior:"smooth"});
}

// LOAD
async function loadData(){
  const res = await fetch(API+"?email="+localStorage.getItem("email"));
  const data = await res.json();

  list.innerHTML = data.map(d=>`
    <div class="bg-[#1e293b] p-2 rounded flex justify-between">
      <div>
        ${d.category}<br>
        <small>${new Date(d.date).toLocaleString()}</small>
      </div>
      <div>
        ${d.display || format(convert(d.amount))}<br>
        <button onclick='edit(${JSON.stringify(d)})'>Edit</button>
        <button onclick='del("${d.date}")'>Delete</button>
      </div>
    </div>
  `).join("");

  calc(data);
  renderChart(data);
}

// CALC
function calc(data){
  let total=0,inc=0,exp=0;

  data.forEach(d=>{
    let v=convert(d.amount);

    if(d.type==="income"){total+=v;inc+=v;}
    else{total-=v;exp+=v;}
  });

  balance.innerText=format(total);
  income.innerText=format(inc);
  expense.innerText=format(exp);
  net.innerText=format(total);
}

// CHART
function renderChart(data){
  let inc={},exp={};

  data.forEach(d=>{
    let day=d.date.split("T")[0];
    let v=convert(d.amount);

    if(d.type==="income") inc[day]=(inc[day]||0)+v;
    else exp[day]=(exp[day]||0)+v;
  });

  const labels=[...new Set([...Object.keys(inc),...Object.keys(exp)])];

  if(chart) chart.destroy();

  chart=new Chart(trend,{
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"Income",data:labels.map(l=>inc[l]||0)},
        {label:"Expense",data:labels.map(l=>exp[l]||0)}
      ]
    }
  });
}

init();
</script>

</body>
</html>
