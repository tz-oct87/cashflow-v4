<!DOCTYPE html>
<html>
<head>
  <title>Cashflow Pro V5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#0f172a] text-gray-200">

<div class="max-w-md mx-auto p-4 space-y-4">

  <!-- LOGIN -->
  <div id="auth" class="bg-[#1e293b] p-6 rounded-xl border border-gray-800">
    <h2 class="text-lg font-semibold mb-4">Cashflow</h2>
    <input id="email" placeholder="Your name"
      class="w-full p-2 rounded text-black mb-3">
    <button onclick="login()" class="w-full bg-white text-black p-2 rounded">
      Enter
    </button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden space-y-4">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
      <h1 id="title" class="text-lg font-semibold"></h1>

      <div class="flex gap-2 items-center">
        <select id="currency" onchange="changeCurrency()"
          class="bg-[#1e293b] border border-gray-700 p-2 rounded text-sm">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
        </select>

        <button onclick="logout()" 
          class="text-xs bg-red-500 px-2 py-1 rounded">
          Logout
        </button>
      </div>
    </div>

    <!-- BALANCE -->
    <div class="bg-[#1e293b] p-4 rounded-xl border border-gray-800">
      <div class="text-sm text-gray-400">Balance</div>
      <div id="balance" class="text-2xl font-bold"></div>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-2 text-sm">
      <div class="bg-[#1e293b] p-3 rounded">Income<br><b id="income"></b></div>
      <div class="bg-[#1e293b] p-3 rounded">Expense<br><b id="expense"></b></div>
      <div class="bg-[#1e293b] p-3 rounded">Net<br><b id="net"></b></div>
    </div>

    <!-- FORM -->
    <div class="bg-[#1e293b] p-4 rounded-xl space-y-2">
      <input id="name" placeholder="Cashflow Name"
        class="w-full p-2 rounded text-black">
      <input id="amount" type="number" placeholder="Amount"
        class="w-full p-2 rounded text-black">

      <div class="grid grid-cols-2 gap-2">
        <select id="category" class="p-2 rounded text-black">
          <option>Food</option>
          <option>Gas</option>
          <option>Bills</option>
          <option>Salary</option>
          <option>Other</option>
        </select>

        <select id="type" class="p-2 rounded text-black">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <button onclick="addData()"
        class="w-full bg-green-400 text-black p-2 rounded">
        Save Transaction
      </button>
    </div>

    <!-- CHART -->
    <div class="bg-[#1e293b] p-4 rounded-xl">
      <canvas id="trend"></canvas>
    </div>

    <!-- LIST -->
    <div id="list" class="space-y-2"></div>

  </div>

</div>

<!-- DELETE MODAL -->
<div id="confirmBox" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-[#1e293b] p-6 rounded-xl text-center space-y-4">
    <div>Delete this transaction?</div>
    <div class="flex gap-2 justify-center">
      <button onclick="confirmDelete()" class="bg-red-500 px-4 py-1 rounded">Yes</button>
      <button onclick="closeConfirm()" class="bg-gray-500 px-4 py-1 rounded">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyBDvRCOUunIKsmhKL1k_kpHVC1778i6GVQct4-OM2B5oalyywjZfx-eUlPWkf9cvMo/exec";

let chart, editTarget=null, deleteTarget=null;
let isSubmitting=false;
let currentCurrency = localStorage.getItem("currency") || "IDR";
let rate = 15500;

// LOGIN
function login(){
  localStorage.setItem("email", email.value);
  init();
}

// LOGOUT
function logout(){
  localStorage.removeItem("email");
  location.reload();
}

// INIT
async function init(){
  const user = localStorage.getItem("email");
  if(!user) return;

  currency.value = currentCurrency;

  await getRate();
  setInterval(getRate, 3600000); // refresh every 1h

  auth.style.display="none";
  app.style.display="block";
  title.innerText = user;

  loadData();
}

// LIVE RATE
async function getRate(){
  try{
    const res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    const data = await res.json();
    rate = data.rates.IDR;
  }catch(e){
    console.log("rate fallback");
  }
}

// CHANGE CURRENCY
function changeCurrency(){
  currentCurrency = currency.value;
  localStorage.setItem("currency", currentCurrency);
  loadData();
}

// FORMAT
function format(num){
  return currentCurrency==="IDR"
    ? "Rp " + Math.round(num).toLocaleString("id-ID")
    : "$" + Math.round(num).toLocaleString("en-US");
}

// CONVERT
function convert(amount){
  return currentCurrency==="IDR"
    ? amount
    : amount / rate;
}

// ADD / EDIT
async function addData(){
  if(isSubmitting) return;
  isSubmitting=true;

  const payload = {
    email: localStorage.getItem("email"),
    name: name.value,
    category: category.value,
    amount: Number(amount.value),
    type: type.value,
    date: editTarget || new Date().toISOString(),
    action: editTarget ? "edit" : "add"
  };

  await fetch(API,{
    method:"POST",
    body:JSON.stringify(payload)
  });

  isSubmitting=false;
  editTarget=null;
  loadData();
}

// DELETE FLOW
function del(date){
  deleteTarget=date;
  confirmBox.classList.remove("hidden");
}

function closeConfirm(){
  confirmBox.classList.add("hidden");
  deleteTarget=null;
}

async function confirmDelete(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      email:localStorage.getItem("email"),
      date:deleteTarget
    })
  });

  closeConfirm();
  loadData();
}

// EDIT
function edit(d){
  name.value=d.name;
  category.value=d.category;
  amount.value=d.amount;
  type.value=d.type;
  editTarget=d.date;
  window.scrollTo({top:0,behavior:"smooth"});
}

// LOAD
async function loadData(){
  const res = await fetch(API+"?email="+localStorage.getItem("email"));
  const data = await res.json();

  list.innerHTML = data.map(d=>`
    <div class="bg-[#1e293b] p-3 rounded flex justify-between">
      <div>
        <div>${d.category}</div>
        <div class="text-xs text-gray-400">
          ${new Date(d.date).toLocaleString()}
        </div>
      </div>
      <div class="text-right">
        <div class="${d.type==='income'?'text-green-400':'text-red-400'}">
          ${d.type==='income'?'+':'-'} ${format(convert(d.amount))}
        </div>
        <div class="text-xs">
          <button onclick='edit(${JSON.stringify(d)})'>Edit</button> |
          <button onclick='del("${d.date}")'>Delete</button>
        </div>
      </div>
    </div>
  `).join("");

  calc(data);
  chartRender(data);
}

// CALC
function calc(data){
  let total=0,inc=0,exp=0;

  data.forEach(d=>{
    let v=convert(d.amount);

    if(d.type==="income"){
      total+=v; inc+=v;
    }else{
      total-=v; exp+=v;
    }
  });

  balance.innerText=format(total);
  income.innerText=format(inc);
  expense.innerText=format(exp);
  net.innerText=format(total);
}

// CHART
function chartRender(data){
  let inc={},exp={};

  data.forEach(d=>{
    let day=d.date.split("T")[0];
    let v=convert(d.amount);

    if(d.type==="income"){
      inc[day]=(inc[day]||0)+v;
    }else{
      exp[day]=(exp[day]||0)+v;
    }
  });

  const labels=[...new Set([...Object.keys(inc),...Object.keys(exp)])];

  if(chart) chart.destroy();

  chart=new Chart(trend,{
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"Income",data:labels.map(l=>inc[l]||0)},
        {label:"Expense",data:labels.map(l=>exp[l]||0)}
      ]
    }
  });
}

init();
</script>

</body>
</html>
