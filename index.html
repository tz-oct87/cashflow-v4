<!DOCTYPE html>
<html>
<head>
  <title>NA2625 Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-[#0b1220] text-gray-200">

<!-- LOGIN -->
<div id="auth" class="flex items-center justify-center h-screen">
  <div class="bg-[#1f2937] p-8 rounded w-96 text-center">

    <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png"
      class="mx-auto mb-6 w-full max-h-28 object-contain">

    <input id="email" placeholder="Your name"
      class="w-full p-2 text-black rounded mb-3">

    <button onclick="login()" class="w-full bg-white text-black p-2 rounded">
      Enter
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex min-h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-[#111827] p-5 hidden md:flex flex-col items-center">
    <img src="https://tactykz.com/wp-content/uploads/2026/03/NA2625-CR.png"
      class="mb-8 w-full max-h-24 object-contain">

    <button onclick="logout()" class="mt-auto w-full text-left p-2 hover:bg-red-500 rounded">
      Logout
    </button>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-6 space-y-6">

    <!-- TOP -->
    <div class="flex justify-between items-center">
      <h1 id="title" class="text-xl font-semibold"></h1>

      <div class="flex gap-2">
        <select id="filter" onchange="loadData()" class="bg-[#1f2937] p-2 rounded">
          <option value="all">All</option>
          <option value="day">Today</option>
          <option value="week">7 Days</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
        </select>

        <select id="currency" onchange="changeCurrency()" class="bg-[#1f2937] p-2 rounded">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
        </select>

        <button onclick="exportPDF()" class="bg-blue-500 px-4 rounded">
          Export PDF
        </button>
      </div>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-[#1f2937] p-4 rounded">Balance<br><b id="balance"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Income<br><b id="income"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Expense<br><b id="expense"></b></div>
    </div>

    <!-- INSIGHTS -->
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-[#1f2937] p-4 rounded">Top Category<br><b id="topCat"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Transactions<br><b id="totalTx"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Avg Spend<br><b id="avgSpend"></b></div>
    </div>

    <!-- FORM -->
    <div id="formBox" class="bg-[#1f2937] p-4 rounded space-y-3">

      <input id="amount" type="number" placeholder="Amount"
        class="w-full p-2 text-black rounded">

      <div class="grid grid-cols-2 gap-2">
        <select id="category" class="p-2 text-black rounded">
          <option>Food</option>
          <option>Gas</option>
          <option>Bills</option>
          <option>Salary</option>
          <option>Other</option>
        </select>

        <select id="type" class="p-2 text-black rounded">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <button id="submitBtn" onclick="addData()"
        class="w-full bg-green-500 p-2 rounded flex justify-center items-center gap-2">
        Submit
      </button>
    </div>

    <!-- ADD AGAIN -->
    <div id="addAgainBox" class="hidden">
      <button onclick="showForm()" class="bg-green-500 px-4 py-2 rounded">
        + Add Another
      </button>
    </div>

    <!-- LIST -->
    <div class="bg-[#1f2937] p-4 rounded">
      <div id="list"></div>
    </div>

  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzFqkTgUqbKflvUB-VnB5oNXDr-9Zjy6OlB-b1D7OfnV2fUfky8QTlKDzK10HDU7bNB/exec";

let rate=15500;
let currentCurrency=localStorage.getItem("currency")||"IDR";
let currentData=[];
let isSubmitting=false;

// LOGIN
function login(){
  localStorage.setItem("email", email.value);
  startApp();
}

function logout(){
  localStorage.clear();
  location.reload();
}

// START
async function startApp(){
  let user=localStorage.getItem("email");

  if(!user){
    auth.style.display="flex";
    app.style.display="none";
    return;
  }

  auth.style.display="none";
  app.style.display="flex";

  title.innerText=user;
  currency.value=currentCurrency;

  let res=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
  let data=await res.json();
  rate=data.rates.IDR;

  loadData();
}

// FORMAT
function format(n){
  return currentCurrency==="IDR"
    ?"Rp "+Math.round(n).toLocaleString("id-ID")
    :"$"+Math.round(n);
}

function convert(n){
  return currentCurrency==="IDR"?n:n/rate;
}

// CHANGE
function changeCurrency(){
  currentCurrency=currency.value;
  localStorage.setItem("currency",currentCurrency);
  loadData();
}

// SUBMIT FIXED
async function addData(){
  if(isSubmitting) return;
  isSubmitting=true;

  // spinner instantly
  submitBtn.innerHTML = `
    <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
  `;

  // force render
  await new Promise(r => setTimeout(r, 50));

  // hide form immediately
  formBox.classList.add("hidden");

  // fake delay (UX)
  await new Promise(r => setTimeout(r, 3000));

  let raw=Number(amount.value);
  let stored=currentCurrency==="USD"?raw*rate:raw;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      email:localStorage.getItem("email"),
      category:category.value,
      amount:stored,
      type:type.value,
      date:new Date().toISOString()
    })
  });

  addAgainBox.classList.remove("hidden");

  isSubmitting=false;
  submitBtn.innerText="Submit";

  loadData();
}

function showForm(){
  formBox.classList.remove("hidden");
  addAgainBox.classList.add("hidden");
}

// FILTER + LOAD (same)
function applyFilter(data){
  let f=filter.value;
  let now=new Date();

  return data.filter(d=>{
    let t=new Date(d.date);
    if(f==="day") return t.toDateString()===now.toDateString();
    if(f==="week") return (now-t)/(1000*60*60*24)<=7;
    if(f==="month") return t.getMonth()===now.getMonth() && t.getFullYear()===now.getFullYear();
    if(f==="year") return t.getFullYear()===now.getFullYear();
    return true;
  });
}

async function loadData(){
  let res=await fetch(API+"?email="+localStorage.getItem("email"));
  let data=await res.json();

  data=applyFilter(data);
  data.sort((a,b)=>new Date(b.date)-new Date(a.date));

  currentData=data;

  list.innerHTML=data.map(d=>`
    <div class="flex justify-between border-b border-gray-700 py-2">
      <div>${d.category}<br><small>${new Date(d.date).toLocaleString()}</small></div>
      <div>${d.type==='income'?'+':'-'} ${format(convert(d.amount))}</div>
    </div>
  `).join("");

  calc(data);
  insights(data);
}

// CALC + INSIGHTS
function calc(data){
  let t=0,i=0,e=0;
  data.forEach(d=>{
    let v=convert(d.amount);
    if(d.type==="income"){t+=v;i+=v;} else{t-=v;e+=v;}
  });
  balance.innerText=format(t);
  income.innerText=format(i);
  expense.innerText=format(e);
}

function insights(data){
  let catMap={}, total=0;
  data.forEach(d=>{
    if(d.type==="expense"){
      let v=convert(d.amount);
      catMap[d.category]=(catMap[d.category]||0)+v;
      total+=v;
    }
  });

  let top=Object.keys(catMap).reduce((a,b)=>catMap[a]>catMap[b]?a:b,"-");

  topCat.innerText=top;
  totalTx.innerText=data.length;
  avgSpend.innerText=format(total/(data.length||1));
}

// PDF FIXED SIMPLE
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();

  doc.setFontSize(14);
  doc.text("NA2625 FINANCIAL STATEMENT",105,20,null,null,"center");

  doc.setFontSize(10);
  doc.text("User: "+localStorage.getItem("email"),10,30);

  let y=40;

  doc.text("Date",10,y);
  doc.text("Category",50,y);
  doc.text("Type",110,y);
  doc.text("Amount",160,y);

  y+=5;

  currentData.forEach(d=>{
    doc.text(new Date(d.date).toLocaleDateString(),10,y);
    doc.text(d.category,50,y);
    doc.text(d.type,110,y);
    doc.text(format(convert(d.amount)),160,y);
    y+=6;
  });

  doc.save("NA2625-statement.pdf");
}

startApp();
</script>

</body>
</html>
