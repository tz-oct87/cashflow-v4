<!DOCTYPE html>
<html>
<head>
  <title>Cashflow Pro V7.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#0b1220] text-gray-200">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-[#111827] p-5 hidden md:block">
    <h2 class="text-xl font-bold mb-6">Cashflow</h2>
    <button onclick="logout()" class="w-full text-left p-2 hover:bg-red-500 rounded">
      Logout
    </button>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-6 space-y-6">

    <!-- TOP -->
    <div class="flex justify-between">
      <h1 id="title" class="text-2xl font-bold"></h1>

      <div class="flex gap-2">
        <select id="filter" onchange="loadData()" class="bg-[#1f2937] p-2 rounded">
          <option value="all">All</option>
          <option value="day">Today</option>
          <option value="week">7 Days</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
        </select>

        <select id="currency" onchange="changeCurrency()" class="bg-[#1f2937] p-2 rounded">
          <option value="IDR">IDR</option>
          <option value="USD">USD</option>
        </select>
      </div>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-[#1f2937] p-4 rounded">Balance<br><b id="balance"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Income<br><b id="income"></b></div>
      <div class="bg-[#1f2937] p-4 rounded">Expense<br><b id="expense"></b></div>
    </div>

    <!-- CONTENT -->
    <div class="grid md:grid-cols-2 gap-6">

      <!-- FORM -->
      <div class="bg-[#1f2937] p-4 rounded space-y-2">
        <input id="name" placeholder="Name" class="w-full p-2 text-black rounded">
        <input id="amount" type="number" placeholder="Amount" class="w-full p-2 text-black rounded">
        <input id="dateInput" type="datetime-local" class="w-full p-2 text-black rounded">

        <div class="grid grid-cols-2 gap-2">
          <select id="category" class="p-2 text-black rounded">
            <option>Food</option>
            <option>Gas</option>
            <option>Bills</option>
            <option>Salary</option>
            <option>Other</option>
          </select>

          <select id="type" class="p-2 text-black rounded">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <button onclick="addData()" class="w-full bg-green-500 p-2 rounded">
          Save
        </button>
      </div>

      <!-- CHART -->
      <div class="bg-[#1f2937] p-4 rounded">
        <canvas id="trend"></canvas>
      </div>

    </div>

    <!-- LIST -->
    <div class="bg-[#1f2937] p-4 rounded">
      <div id="list" class="space-y-2"></div>
    </div>

  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzxKxarwVTitY64I5fQWkMZ-ru7giI5mlMynLj0nRjysegRyaV2vjB526T5PPvh2tjK/exec";

let rate = 15500;
let currentCurrency = localStorage.getItem("currency") || "IDR";
let chart;

// INIT
async function init(){
  title.innerText = localStorage.getItem("email");

  currency.value = currentCurrency;

  let res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
  let data = await res.json();
  rate = data.rates.IDR;

  loadData();
}

// FORMAT
function format(n){
  return currentCurrency === "IDR"
    ? "Rp " + Math.round(n).toLocaleString("id-ID")
    : "$" + Math.round(n);
}

// CONVERT (IDR BASE)
function convert(n){
  return currentCurrency === "IDR" ? n : n / rate;
}

// CHANGE CURRENCY
function changeCurrency(){
  currentCurrency = currency.value;
  localStorage.setItem("currency", currentCurrency);
  loadData();
}

// ADD
async function addData(){
  let raw = Number(amount.value);
  let stored = currentCurrency === "USD" ? raw * rate : raw;

  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      email: localStorage.getItem("email"),
      name: name.value,
      category: category.value,
      amount: stored,
      type: type.value,
      date: dateInput.value || new Date().toISOString(),
      display: format(raw)
    })
  });

  loadData();
}

// FILTER LOGIC
function applyFilter(data){
  let f = filter.value;
  let now = new Date();

  return data.filter(d=>{
    let t = new Date(d.date);

    if(f==="day") return t.toDateString() === now.toDateString();

    if(f==="week"){
      let diff = (now - t) / (1000*60*60*24);
      return diff <= 7;
    }

    if(f==="month"){
      return t.getMonth()===now.getMonth() &&
             t.getFullYear()===now.getFullYear();
    }

    if(f==="year"){
      return t.getFullYear()===now.getFullYear();
    }

    return true;
  });
}

// LOAD
async function loadData(){
  let res = await fetch(API+"?email="+localStorage.getItem("email"));
  let data = await res.json();

  data = applyFilter(data);

  // SORT NEWEST FIRST
  data.sort((a,b)=> new Date(b.date) - new Date(a.date));

  list.innerHTML = data.map(d=>`
    <div class="flex justify-between border-b border-gray-700 pb-2">
      <div>
        ${d.category}<br>
        <small>${new Date(d.date).toLocaleString()}</small>
      </div>
      <div class="${d.type==='income'?'text-green-400':'text-red-400'}">
        ${d.display || format(convert(d.amount))}
      </div>
    </div>
  `).join("");

  calc(data);
  drawChart(data);
}

// CALC
function calc(data){
  let total=0,inc=0,exp=0;

  data.forEach(d=>{
    let v = convert(d.amount);

    if(d.type==="income"){
      total+=v; inc+=v;
    } else {
      total-=v; exp+=v;
    }
  });

  balance.innerText = format(total);
  income.innerText = format(inc);
  expense.innerText = format(exp);
}

// CHART
function drawChart(data){
  let map={};

  data.forEach(d=>{
    let day = d.date.split("T")[0];
    let v = convert(d.amount);

    map[day] = (map[day] || 0) + (d.type==="income"?v:-v);
  });

  let labels = Object.keys(map).sort();

  if(chart) chart.destroy();

  chart = new Chart(trend,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Net",
        data:labels.map(l=>map[l])
      }]
    }
  });
}

function logout(){
  localStorage.clear();
  location.reload();
}

init();
</script>

</body>
</html>
